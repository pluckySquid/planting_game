<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80">
  <!-- Drop shadow -->
  <ellipse cx="32" cy="74" rx="20" ry="3" fill="#000" opacity="0.22"/>
  <!-- Bag body (burlap/canvas sack) -->
  <path d="M 13 30 Q 12 50 16 64 Q 22 75 32 75 Q 42 75 48 64 Q 52 50 51 30 Q 48 25 32 25 Q 16 25 13 30 Z"
        fill="#d8aa6c" stroke="#5e3413" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Highlight / fold on the left side -->
  <path d="M 18 36 Q 16 52 20 70" stroke="#eccc94" stroke-width="3" fill="none"
        stroke-linecap="round" opacity="0.55"/>
  <!-- Subtle fold on right -->
  <path d="M 46 36 Q 48 52 44 70" stroke="#a87332" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.5"/>
  <!-- Burlap weave hint (tiny dots) -->
  <g fill="#8b5a2b" opacity="0.35">
    <circle cx="22" cy="48" r="0.8"/>
    <circle cx="28" cy="54" r="0.8"/>
    <circle cx="34" cy="50" r="0.8"/>
    <circle cx="40" cy="58" r="0.8"/>
    <circle cx="26" cy="62" r="0.8"/>
    <circle cx="38" cy="44" r="0.8"/>
  </g>
  <!-- Rope cinch / tie at the neck -->
  <path d="M 20 22 Q 32 18 44 22 L 44 30 Q 32 27 20 30 Z"
        fill="#9c5a23" stroke="#3f1e0a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Rope highlight -->
  <path d="M 22 24 Q 32 21 42 24" stroke="#d28548" stroke-width="1.5" fill="none"
        stroke-linecap="round" opacity="0.7"/>
  <!-- Knot loops -->
  <path d="M 24 22 Q 26 12 32 17 Q 38 12 40 22"
        stroke="#3f1e0a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tiny "leaf sprout" peeking from neck (decorative) -->
  <path d="M 32 17 Q 30 12 28 14 M 32 17 Q 34 12 36 14"
        stroke="#4d8a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
