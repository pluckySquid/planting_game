<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Onion seedling: white-purple bulb at base + tall hollow tube leaves -->
  <!-- Bulb (visible round shape at base) -->
  <ellipse cx="32" cy="78" rx="11" ry="9" fill="#f7e2c0" stroke="#5a3a18" stroke-width="1.5"/>
  <!-- Bulb purple shading on bottom -->
  <path d="M 22 80 Q 22 88 32 88 Q 42 88 42 80 Q 38 84 32 84 Q 26 84 22 80 Z"
        fill="#c79bc8" stroke="#5a3a18" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Highlight on bulb -->
  <ellipse cx="28" cy="74" rx="3" ry="4" fill="#fff5e0" opacity="0.7"/>
  <!-- Vertical stripes on bulb (onion lines) -->
  <g stroke="#a07840" stroke-width="0.7" fill="none" opacity="0.5">
    <path d="M 26 70 Q 26 78 28 84"/>
    <path d="M 32 70 L 32 84"/>
    <path d="M 38 70 Q 38 78 36 84"/>
  </g>
  <!-- Tall hollow tube leaves (the giveaway) -->
  <g fill="none" stroke="#3a7022" stroke-width="3.5" stroke-linecap="round">
    <path d="M 26 72 Q 22 50 16 18"/>
    <path d="M 32 72 Q 32 44 32 10"/>
    <path d="M 38 72 Q 42 50 48 18"/>
  </g>
  <!-- Tube highlight (lighter green inside the tube look) -->
  <g fill="none" stroke="#92d958" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <path d="M 26 72 Q 22 50 16 20"/>
    <path d="M 32 72 Q 32 44 32 12"/>
    <path d="M 38 72 Q 42 50 48 20"/>
  </g>
</svg>
