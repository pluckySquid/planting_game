<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Soil mound suggestion -->
  <ellipse cx="32" cy="84" rx="22" ry="3" fill="#4d2913" opacity="0.4"/>

  <!-- The coconut (the SEED itself) — half-buried, brown, hairy -->
  <ellipse cx="32" cy="74" rx="16" ry="12" fill="#8b5a2b" stroke="#3a1f0a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Coconut shading -->
  <path d="M 16 74 Q 16 84 32 86 Q 48 84 48 74" fill="#6e4520" stroke="#3a1f0a" stroke-width="1.6"/>
  <!-- Highlight on coconut -->
  <ellipse cx="24" cy="68" rx="5" ry="3" fill="#c08850" opacity="0.55"/>
  <!-- Three "eyes" (typical coconut markings) -->
  <g fill="#3a1f0a">
    <circle cx="28" cy="70" r="1.4"/>
    <circle cx="36" cy="70" r="1.4"/>
    <circle cx="32" cy="74" r="1.4"/>
  </g>
  <!-- Fibrous / hairy texture (short hatch lines) -->
  <g stroke="#3a1f0a" stroke-width="0.8" stroke-linecap="round" opacity="0.55">
    <path d="M 18 78 L 16 80"/>
    <path d="M 22 82 L 21 84"/>
    <path d="M 28 84 L 28 86"/>
    <path d="M 36 84 L 36 86"/>
    <path d="M 42 82 L 43 84"/>
    <path d="M 46 78 L 48 80"/>
    <path d="M 17 70 L 15 71"/>
    <path d="M 47 70 L 49 71"/>
  </g>

  <!-- Short sprouting stem coming OUT of the coconut top -->
  <path d="M 30 64 Q 30 50 32 36 Q 34 50 34 64 Z"
        fill="#a8d36c" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Stem ring details -->
  <g stroke="#3a7022" stroke-width="0.7" fill="none" opacity="0.7">
    <path d="M 30 56 Q 32 58 34 56"/>
    <path d="M 30 48 Q 32 50 34 48"/>
  </g>

  <!-- Three small palm-like fronds (just sprouting, simple shape) -->
  <g fill="#7ec441" stroke="#1f420e" stroke-width="1.4" stroke-linejoin="round">
    <!-- Left frond -->
    <path d="M 32 36 Q 18 24 12 16 Q 16 24 24 34 Q 28 32 32 36 Z"/>
    <!-- Right frond -->
    <path d="M 32 36 Q 46 24 52 16 Q 48 24 40 34 Q 36 32 32 36 Z"/>
    <!-- Center small frond (still curled / young) -->
    <path d="M 32 36 Q 30 18 32 8 Q 34 18 32 36 Z"/>
  </g>

  <!-- Tiny notches on fronds to suggest palm leaflets -->
  <g stroke="#1f420e" stroke-width="0.8" fill="none">
    <path d="M 22 28 L 20 30"/>
    <path d="M 18 22 L 16 24"/>
    <path d="M 42 28 L 44 30"/>
    <path d="M 46 22 L 48 24"/>
  </g>

  <!-- Highlight on center frond -->
  <path d="M 32 32 L 32 14" stroke="#bfe88f" stroke-width="0.8" fill="none" opacity="0.7"/>
</svg>
