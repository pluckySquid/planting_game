<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Carrot seedling: feathery fern-like fronds with the orange root tip showing -->
  <!-- Orange root peeking from soil -->
  <path d="M 26 80 Q 32 88 38 80 L 36 74 Q 32 76 28 74 Z"
        fill="#ee802a" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Highlight on root -->
  <path d="M 30 78 Q 32 82 30 76" stroke="#fbc580" stroke-width="1" fill="none" opacity="0.8"/>
  <!-- Stems and feathery fronds -->
  <g stroke="#3a7022" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 32 74 Q 24 50 16 24"/>
    <path d="M 32 74 Q 32 46 32 14"/>
    <path d="M 32 74 Q 40 50 48 24"/>
  </g>
  <!-- Feathery leaflets along each stem -->
  <g fill="#7dd44a" stroke="#1f420e" stroke-width="0.8" stroke-linejoin="round">
    <!-- Left stem leaflets -->
    <ellipse cx="28" cy="60" rx="2.5" ry="4" transform="rotate(-30 28 60)"/>
    <ellipse cx="22" cy="46" rx="2.5" ry="4.5" transform="rotate(-40 22 46)"/>
    <ellipse cx="18" cy="32" rx="2.5" ry="4" transform="rotate(-50 18 32)"/>
    <!-- Right stem leaflets -->
    <ellipse cx="36" cy="60" rx="2.5" ry="4" transform="rotate(30 36 60)"/>
    <ellipse cx="42" cy="46" rx="2.5" ry="4.5" transform="rotate(40 42 46)"/>
    <ellipse cx="46" cy="32" rx="2.5" ry="4" transform="rotate(50 46 32)"/>
    <!-- Center stem leaflets -->
    <ellipse cx="29" cy="56" rx="2" ry="4" transform="rotate(-12 29 56)"/>
    <ellipse cx="35" cy="40" rx="2" ry="4" transform="rotate(12 35 40)"/>
    <ellipse cx="32" cy="22" rx="2.5" ry="4.5"/>
  </g>
</svg>
