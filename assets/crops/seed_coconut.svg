<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Palm fronds (3 leaves) -->
  <g fill="#5fa83a" stroke="#1f420e" stroke-width="1.3" stroke-linejoin="round">
    <path d="M 16 8 Q 8 4 5 6 Q 9 10 14 10 Z"/>
    <path d="M 16 8 Q 24 4 27 6 Q 23 10 18 10 Z"/>
    <path d="M 16 8 Q 16 2 14 2 Q 14 6 16 10 Q 18 6 18 2 Q 16 2 16 8 Z"/>
  </g>
  <!-- Coconut body — brown round with hairy texture -->
  <circle cx="16" cy="20" r="9" fill="#8b5a2b" stroke="#3a1f0a" stroke-width="1.6"/>
  <!-- Three eyes / dots (typical coconut markings) -->
  <g fill="#3a1f0a">
    <circle cx="13" cy="18" r="1.3"/>
    <circle cx="19" cy="18" r="1.3"/>
    <circle cx="16" cy="21" r="1.3"/>
  </g>
  <!-- Hairy fiber texture (short lines) -->
  <g stroke="#5a3514" stroke-width="0.7" stroke-linecap="round" opacity="0.7">
    <path d="M 9 22 L 8 24"/>
    <path d="M 11 25 L 10 27"/>
    <path d="M 16 28 L 16 30"/>
    <path d="M 21 25 L 22 27"/>
    <path d="M 23 22 L 24 24"/>
    <path d="M 8 18 L 7 19"/>
    <path d="M 24 18 L 25 19"/>
  </g>
  <!-- Highlight -->
  <ellipse cx="13" cy="16" rx="2" ry="2.5" fill="#c08850" opacity="0.6"/>
</svg>
