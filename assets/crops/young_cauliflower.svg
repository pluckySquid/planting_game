<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Cauliflower seedling: broad ribbed leaves wrapping a white floret cluster -->
  <!-- Outer leaves (large, ribbed) -->
  <g fill="#5fa83a" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round">
    <path d="M 32 80 C 8 78 4 48 18 34 C 24 44 28 60 32 80 Z"/>
    <path d="M 32 80 C 56 78 60 48 46 34 C 40 44 36 60 32 80 Z"/>
    <path d="M 32 80 C 18 60 12 30 28 22 C 30 38 32 56 32 80 Z"/>
    <path d="M 32 80 C 46 60 52 30 36 22 C 34 38 32 56 32 80 Z"/>
  </g>
  <!-- Leaf veins (cauliflower has prominent ribs) -->
  <g stroke="#3a7022" stroke-width="1" fill="none">
    <path d="M 18 76 Q 14 56 18 36"/>
    <path d="M 46 76 Q 50 56 46 36"/>
    <path d="M 28 80 Q 22 50 28 24"/>
    <path d="M 36 80 Q 42 50 36 24"/>
  </g>
  <!-- White floret cluster center (the cauliflower head forming) -->
  <g fill="#fffce0" stroke="#3a7022" stroke-width="1" stroke-linejoin="round">
    <circle cx="28" cy="50" r="6"/>
    <circle cx="36" cy="46" r="5.5"/>
    <circle cx="32" cy="54" r="6"/>
    <circle cx="32" cy="42" r="5"/>
    <circle cx="26" cy="44" r="4"/>
    <circle cx="38" cy="52" r="5"/>
  </g>
  <!-- Subtle bumps on florets -->
  <g fill="#f0e9c8" opacity="0.7">
    <circle cx="29" cy="48" r="1.5"/>
    <circle cx="35" cy="44" r="1.2"/>
    <circle cx="33" cy="52" r="1.5"/>
  </g>
</svg>
