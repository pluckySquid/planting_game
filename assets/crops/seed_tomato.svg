<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Tomato body -->
  <circle cx="16" cy="18" r="10.5" fill="#e63946" stroke="#7a1a20" stroke-width="1.6"/>
  <!-- Subtle shading -->
  <path d="M 16 9 Q 6 14 9 26" stroke="#b02234" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Star green calyx (5-petal cap) -->
  <g fill="#3f8c25" stroke="#1f420e" stroke-width="1.2" stroke-linejoin="round">
    <path d="M 16 8 L 12 5 L 13 9 Z"/>
    <path d="M 16 8 L 20 5 L 19 9 Z"/>
    <path d="M 16 8 L 9 9 L 13 11 Z"/>
    <path d="M 16 8 L 23 9 L 19 11 Z"/>
    <path d="M 16 8 L 16 11 Z"/>
  </g>
  <!-- Stem -->
  <path d="M 16 8 L 16 4" stroke="#2f6b1c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Highlight -->
  <ellipse cx="12" cy="14" rx="2.5" ry="3.5" fill="#fca5a5" opacity="0.7"/>
