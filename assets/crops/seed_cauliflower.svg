<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Green outer leaves -->
  <g fill="#5fa83a" stroke="#1f420e" stroke-width="1.4" stroke-linejoin="round">
    <path d="M 6 16 Q 4 24 12 26 Q 14 22 12 18 Z"/>
    <path d="M 26 16 Q 28 24 20 26 Q 18 22 20 18 Z"/>
    <path d="M 16 6 Q 12 6 11 12 Q 14 14 16 12 Z"/>
    <path d="M 16 6 Q 20 6 21 12 Q 18 14 16 12 Z"/>
  </g>
  <!-- White cauliflower head (florets clustered into a round dome) -->
  <circle cx="16" cy="16" r="9" fill="#fffce0" stroke="#1f420e" stroke-width="1.6"/>
  <!-- Floret bumps -->
  <g fill="#fffce0" stroke="#3a7022" stroke-width="1">
    <circle cx="12" cy="14" r="3.5"/>
    <circle cx="20" cy="14" r="3.5"/>
    <circle cx="16" cy="12" r="3"/>
    <circle cx="13" cy="19" r="3"/>
    <circle cx="19" cy="19" r="3"/>
    <circle cx="16" cy="20" r="2.8"/>
  </g>
  <!-- Tiny shadow dots between florets -->
  <g fill="#d8d3a8" opacity="0.7">
    <circle cx="14" cy="16" r="0.7"/>
    <circle cx="18" cy="16" r="0.7"/>
    <circle cx="16" cy="17.5" r="0.7"/>
  </g>
</svg>
