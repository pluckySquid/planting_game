<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Eggplant seedling: thick stem, broad leaves, tiny purple eggplant fruit -->
  <!-- Main stem -->
  <path d="M 32 84 L 32 30" stroke="#3a6a1e" stroke-width="3" stroke-linecap="round"/>
  <!-- Big broad leaves -->
  <g fill="#5b9c45" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round">
    <path d="M 32 72 C 14 72 8 54 16 42 C 24 50 30 60 32 72 Z"/>
    <path d="M 32 72 C 50 72 56 54 48 42 C 40 50 34 60 32 72 Z"/>
    <path d="M 32 52 C 16 50 12 32 22 22 C 26 32 30 42 32 52 Z"/>
    <path d="M 32 52 C 48 50 52 32 42 22 C 38 32 34 42 32 52 Z"/>
  </g>
  <!-- Leaf veins -->
  <g stroke="#3a6a1e" stroke-width="0.8" fill="none" opacity="0.7">
    <path d="M 30 70 Q 20 60 16 46"/>
    <path d="M 34 70 Q 44 60 48 46"/>
    <path d="M 30 50 Q 24 40 22 26"/>
    <path d="M 34 50 Q 40 40 42 26"/>
  </g>
  <!-- Tiny purple eggplant peeking out -->
  <ellipse cx="32" cy="42" rx="6" ry="10" fill="#7e3eb3" stroke="#3d1b5b" stroke-width="1.2"/>
  <!-- Eggplant cap (green sepals) -->
  <path d="M 28 34 Q 30 30 32 33 Q 34 30 36 34 L 35 38 L 29 38 Z"
        fill="#5b9c45" stroke="#1f420e" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Highlight on eggplant -->
  <ellipse cx="30" cy="40" rx="1.5" ry="3" fill="#b780df" opacity="0.7"/>
</svg>
