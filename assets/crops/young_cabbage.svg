<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Cabbage: layered round leaves with a pale heart -->
  <!-- Outer leaves (largest, darker green) -->
  <g fill="#7bc757" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round">
    <ellipse cx="14" cy="64" rx="14" ry="20" transform="rotate(-18 14 64)"/>
    <ellipse cx="50" cy="64" rx="14" ry="20" transform="rotate(18 50 64)"/>
    <ellipse cx="32" cy="78" rx="22" ry="10"/>
  </g>
  <!-- Middle leaves -->
  <g fill="#9ee37d" stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round">
    <ellipse cx="22" cy="58" rx="11" ry="16" transform="rotate(-12 22 58)"/>
    <ellipse cx="42" cy="58" rx="11" ry="16" transform="rotate(12 42 58)"/>
    <ellipse cx="32" cy="46" rx="12" ry="14"/>
  </g>
  <!-- Inner heart (paler, where cabbage head will form) -->
  <ellipse cx="32" cy="56" rx="10" ry="13" fill="#dff5b8" stroke="#3a7022" stroke-width="1.5"/>
  <!-- Veins on heart -->
  <path d="M 32 44 Q 30 56 32 68 M 26 50 Q 28 58 26 65 M 38 50 Q 36 58 38 65"
        stroke="#5fa337" stroke-width="0.8" fill="none"/>
</svg>
