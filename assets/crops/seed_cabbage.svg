<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer leaves (darker) -->
  <circle cx="16" cy="17" r="11" fill="#7bc757" stroke="#1f420e" stroke-width="1.6"/>
  <!-- Leaf wrap segments -->
  <path d="M 16 6 Q 6 14 16 28" stroke="#3a7022" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M 16 6 Q 26 14 16 28" stroke="#3a7022" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Inner head (lighter, paler) -->
