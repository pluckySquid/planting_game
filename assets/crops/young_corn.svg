<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="64" height="88">
  <!-- Tall narrow corn-blade leaves (corn = grass-like) -->
  <g stroke="#1f420e" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Center spear (tallest) -->
    <path d="M 32 84 Q 32 50 32 12 L 33 50 L 32 84 Z" fill="#86d147"/>
    <!-- Left blade -->
    <path d="M 32 84 Q 28 60 18 26 Q 24 50 30 70 L 32 84 Z" fill="#7ec241"/>
    <!-- Right blade -->
    <path d="M 32 84 Q 36 60 46 26 Q 40 50 34 70 L 32 84 Z" fill="#7ec241"/>
    <!-- Smaller left blade -->
    <path d="M 32 84 Q 26 64 16 44 Q 22 56 28 72 L 32 84 Z" fill="#92d958" opacity="0.85"/>
    <!-- Smaller right blade -->
    <path d="M 32 84 Q 38 64 48 44 Q 42 56 36 72 L 32 84 Z" fill="#92d958" opacity="0.85"/>
  </g>
  <!-- Light highlight stripe on center blade -->
  <path d="M 32 18 Q 32 50 32 80" stroke="#c8f08c" stroke-width="0.8" fill="none" opacity="0.7"/>
</svg>
