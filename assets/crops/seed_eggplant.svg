<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Eggplant body — purple teardrop -->
  <ellipse cx="16" cy="20" rx="7.5" ry="10" fill="#7e3eb3" stroke="#3d1b5b" stroke-width="1.6"/>
  <!-- Tapered top -->
  <path d="M 12 12 Q 16 8 20 12 Q 19 14 13 14 Z" fill="#7e3eb3" stroke="#3d1b5b" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Highlight stripe -->
  <ellipse cx="13" cy="18" rx="1.8" ry="5" fill="#b780df" opacity="0.7"/>
  <!-- Green calyx (cap + sepals) -->
  <g fill="#3f8c25" stroke="#1f420e" stroke-width="1.2" stroke-linejoin="round">
    <path d="M 11 10 Q 16 7 21 10 L 21 13 L 11 13 Z"/>
    <path d="M 11 11 L 8 8 L 12 12 Z"/>
    <path d="M 21 11 L 24 8 L 20 12 Z"/>
    <path d="M 16 9 L 16 4" stroke="#2f6b1c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
