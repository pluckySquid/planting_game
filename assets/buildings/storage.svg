<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  
      <!-- Base / Walls -->
      <rect x="25" y="50" width="50" height="40" fill="#a44a3f" stroke="#4a2411" stroke-width="3"/>
      <!-- Door -->
      <rect x="40" y="65" width="20" height="25" fill="#4a2411" />
      
      <!-- Hay bales left -->
      <circle cx="20" cy="85" r="10" fill="#e9c46a" stroke="#4a2411" stroke-width="2"/>
      <circle cx="15" cy="75" r="10" fill="#e9c46a" stroke="#4a2411" stroke-width="2"/>
      <circle cx="28" cy="75" r="10" fill="#e9c46a" stroke="#4a2411" stroke-width="2"/>
      <path d="M 10 75 Q 15 75, 20 75" stroke="#4a2411" stroke-width="1.5"/>
      <path d="M 10 85 Q 20 85, 30 85" stroke="#4a2411" stroke-width="1.5"/>

      <!-- Roof (Round cone shape) -->
      <path d="M 10 60 C 10 30, 40 15, 50 15 C 60 15, 90 30, 90 60 Q 50 70, 10 60 Z" fill="#f4d03f" stroke="#8a5a19" stroke-width="3"/>
      
      <!-- Top knot/sack -->
      <circle cx="50" cy="12" r="8" fill="#f4d03f" stroke="#8a5a19" stroke-width="2"/>
      <path d="M 45 20 L 55 20" stroke="#8a5a19" stroke-width="3"/>
    
</svg>