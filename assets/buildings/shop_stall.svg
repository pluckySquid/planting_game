<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Shop Stall Base (Brown wood) -->
  <path d="M 20 80 L 20 60 L 80 60 L 80 80 Z" fill="#6c4228" stroke="#4a2411" stroke-width="2"/>
  <!-- Front Counter (Lighter wood) -->
  <rect x="15" y="70" width="70" height="15" fill="#a46a48" stroke="#4a2411" stroke-width="2" rx="2"/>
  <!-- Posts -->
  <rect x="25" y="30" width="6" height="40" fill="#8f4322" stroke="#4a2411" stroke-width="2"/>
  <rect x="69" y="30" width="6" height="40" fill="#8f4322" stroke="#4a2411" stroke-width="2"/>
  <!-- Ornate Canopy/Roof (Blueish-green tiles, swooping style) -->
  <path d="M 10 35 C 20 15, 80 15, 90 35 C 80 40, 70 30, 50 30 C 30 30, 20 40, 10 35 Z" fill="#2a9d8f" stroke="#1d3557" stroke-width="3"/>
  <path d="M 10 35 Q 20 45, 30 35 Q 40 45, 50 35 Q 60 45, 70 35 Q 80 45, 90 35" fill="none" stroke="#e9c46a" stroke-width="2"/>
  <!-- Hanging Lanterns (Red) -->
  <ellipse cx="28" cy="45" rx="5" ry="8" fill="#e63946" stroke="#4a2411" stroke-width="2"/>
  <ellipse cx="72" cy="45" rx="5" ry="8" fill="#e63946" stroke="#4a2411" stroke-width="2"/>
  <!-- Round Sign Board on top -->
  <circle cx="50" cy="15" r="10" fill="#f4a261" stroke="#4a2411" stroke-width="3"/>
  <!-- Goods on display -->
  <circle cx="30" cy="65" r="5" fill="#e9c46a"/>
  <circle cx="50" cy="65" r="5" fill="#e9c46a"/>
  <circle cx="70" cy="65" r="5" fill="#e9c46a"/>
</svg>