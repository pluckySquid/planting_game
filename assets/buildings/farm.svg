<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  
      <!-- Main building walls -->
      <rect x="20" y="45" width="45" height="35" fill="#a44a3f" stroke="#4a2411" stroke-width="2.5"/>
      <!-- Extension right -->
      <rect x="60" y="55" width="25" height="25" fill="#a44a3f" stroke="#4a2411" stroke-width="2.5"/>
      
      <!-- Door -->
      <rect x="35" y="55" width="15" height="25" fill="#4a2411" />
      
      <!-- Box on right -->
      <rect x="65" y="65" width="12" height="12" fill="#e9c46a" stroke="#4a2411" stroke-width="2"/>
      <path d="M 65 71 L 77 71 M 71 65 L 71 77" stroke="#4a2411" stroke-width="1.5"/>

      <!-- Logs/Wood on left -->
      <rect x="10" y="65" width="15" height="5" fill="#cf864c" stroke="#4a2411" stroke-width="2" rx="2"/>
      <rect x="8" y="70" width="15" height="5" fill="#cf864c" stroke="#4a2411" stroke-width="2" rx="2"/>
      <rect x="10" y="75" width="15" height="5" fill="#cf864c" stroke="#4a2411" stroke-width="2" rx="2"/>

      <!-- Main Roof (Thick straw, layered) -->
      <path d="M 10 50 C 10 25, 30 15, 45 15 C 60 15, 75 25, 75 50 Q 45 58, 10 50 Z" fill="#f4d03f" stroke="#8a5a19" stroke-width="3"/>
      <!-- Extension Roof -->
      <path d="M 55 60 C 55 45, 65 35, 75 35 C 85 35, 95 45, 95 60 Q 75 65, 55 60 Z" fill="#f4d03f" stroke="#8a5a19" stroke-width="3"/>
      
      <!-- Red roof ridge top -->
      <path d="M 15 25 Q 45 5, 70 25" fill="none" stroke="#e63946" stroke-width="5" stroke-linecap="round"/>
    
</svg>